services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite+aiosqlite:////data/vea.db
      # 本番では .env の VEA_SECRET_KEY で vCenter パスワードを DB 暗号化（未設定時は平文 + 起動 WARNING）
      # 生成例: openssl rand -base64 32
      APP_LOG_FILE: /var/log/vea/app.log
      UVICORN_LOG_FILE: /var/log/vea/uvicorn.log
    volumes:
      - vea_data:/data
      - vea_logs:/var/log/vea

volumes:
  vea_data:
  vea_logs:
