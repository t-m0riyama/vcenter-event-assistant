name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Sync and test
        run: |
          uv sync --all-groups
          uv run ruff check src tests
          uv run mypy
          uv run pytest

  frontend-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'
      - uses: actions/setup-node@v4
        if: github.event_name == 'push' || steps.changes.outputs.frontend == 'true'
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Unit tests and coverage
        if: github.event_name == 'push' || steps.changes.outputs.frontend == 'true'
        working-directory: frontend
        run: npm ci && npm run test:coverage
      - name: Upload coverage reports
        if: github.event_name == 'push' || steps.changes.outputs.frontend == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: |
            frontend/coverage/coverage-summary.json
            frontend/coverage/index.html
          if-no-files-found: error

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            e2e:
              - 'frontend/**'
              - 'src/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/ci.yml'
      - uses: astral-sh/setup-uv@v5
        if: github.event_name == 'push' || steps.changes.outputs.e2e == 'true'
        with:
          version: "latest"
      - uses: actions/setup-node@v4
        if: github.event_name == 'push' || steps.changes.outputs.e2e == 'true'
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Sync Python deps
        if: github.event_name == 'push' || steps.changes.outputs.e2e == 'true'
        run: uv sync --all-groups
      - name: Install frontend deps and Playwright Chromium
        if: github.event_name == 'push' || steps.changes.outputs.e2e == 'true'
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: E2E
        if: github.event_name == 'push' || steps.changes.outputs.e2e == 'true'
        working-directory: frontend
        env:
          CI: "true"
        run: npm run e2e
